<section class="section schedule-section" id="schedule">
  <div class="container schedule-layout">
    <div>
      <div class="section-header">
        <p class="eyebrow">Schedule</p>
        <h2>Show the timetable or availability clearly.</h2>
        <p>Useful for gyms, yoga studios, podcasts, bookings, launch calendars, and appointment-based businesses.</p>
      </div>
    </div>
    <div class="schedule-card">
      <div class="schedule-head">
        <h3>Weekly Schedule</h3>
        <span class="badge-pill">Book ahead</span>
      </div>
      <div class="schedule-table-wrap">
        <table class="schedule-table">
          <thead>
            <tr><th>Day</th><th>Morning</th><th>Evening</th></tr>
          </thead>
          <tbody>
            <tr><td>Monday</td><td>6:00 AM</td><td>5:30 PM</td></tr>
            <tr><td>Wednesday</td><td>6:00 AM</td><td>6:00 PM</td></tr>
            <tr><td>Saturday</td><td>8:00 AM</td><td>Open session</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</section>
